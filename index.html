function MiniBarChart({data,valueKey,color="#6366f1",height=70}){
  const max=Math.max(...data.map(d=>d[valueKey]));
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{width:"100%",borderRadius:4,background:color,height:`${(d[valueKey]/max)*(height-18)}px`,opacity:0.65+(d[valueKey]/max)*0.35,minHeight:4}}/>
          <span style={{fontSize:9,color:"var(--text-muted)",whiteSpace:"nowrap"}}>{d.day}</span>
        </div>
      ))}
    </div>
  );
}

function RadialProgress({value,size=72,stroke=7,color="#6366f1",label}){
  const r=(size-stroke)/2;
  const circ=2*Math.PI*r;
  const offset=circ-(value/100)*circ;
  return(
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:14,fontWeight:700,color:"var(--text-primary)"}}>{value}%</span>
        {label&&<span style={{fontSize:8,color:"var(--text-muted)",textAlign:"center",lineHeight:1.2}}>{label}</span>}
      </div>
    </div>
  );
}

function PomodoroTimer(){
  const [mode,setMode]=useState("focus");
  const [timeLeft,setTimeLeft]=useState(25*60);
  const [running,setRunning]=useState(false);
  const [sessions,setSessions]=useState(0);
  const timerRef=useRef(null);
  const durations={focus:25*60,short:5*60,long:15*60};
  const labels={focus:"Focus",short:"Short Break",long:"Long Break"};
  const colors={focus:"#6366f1",short:"#10b981",long:"#8b5cf6"};
  useEffect(()=>{
    if(running){
      timerRef.current=setInterval(()=>{
        setTimeLeft(t=>{
          if(t<=1){clearInterval(timerRef.current);setRunning(false);if(mode==="focus")setSessions(s=>s+1);return 0;}
          return t-1;
        });
      },1000);
    }else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[running,mode]);
  const switchMode=(m)=>{setMode(m);setTimeLeft(durations[m]);setRunning(false);};
  const mins=String(Math.floor(timeLeft/60)).padStart(2,"0");
  const secs=String(timeLeft%60).padStart(2,"0");
  const progress=((durations[mode]-timeLeft)/durations[mode])*100;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
        {Object.keys(durations).map(m=>(
          <button key={m} onClick={()=>switchMode(m)} style={{padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:mode===m?colors[m]:"rgba(255,255,255,0.1)",color:mode===m?"#fff":"var(--text-secondary)"}}>
            {labels[m]}
          </button>
        ))}
      </div>
      <div style={{position:"relative",width:160,height:160}}>
        <svg width={160} height={160} style={{transform:"rotate(-90deg)"}}>
          <circle cx={80} cy={80} r={68} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={10}/>
          <circle cx={80} cy={80} r={68} fill="none" stroke={colors[mode]} strokeWidth={10}
            strokeDasharray={427} strokeDashoffset={427-(progress/100)*427} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:38,fontWeight:800,color:"var(--text-primary)",letterSpacing:-2}}>{mins}:{secs}</span>
          <span style={{fontSize:11,color:"var(--text-muted)"}}>{labels[mode]}</span>
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>setRunning(r=>!r)} style={{padding:"12px 28px",borderRadius:12,border:"none",cursor:"pointer",background:colors[mode],color:"#fff",fontWeight:700,fontSize:15,boxShadow:`0 4px 16px ${colors[mode]}50`}}>
          {running?"⏸ Pause":"▶ Start"}
        </button>
        <button onClick={()=>{setTimeLeft(durations[mode]);setRunning(false);}} style={{padding:"12px 16px",borderRadius:12,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.1)",color:"var(--text-secondary)",fontSize:15}}>↺</button>
      </div>
      <div style={{display:"flex",gap:14,fontSize:13,color:"var(--text-muted)"}}>
        <span>🍅 <strong style={{color:"var(--text-primary)"}}>{sessions}</strong> sessions</span>
        <span>⏱ <strong style={{color:"var(--text-primary)"}}>{sessions*25}min</strong></span>
      </div>
    </div>
  );
}

    r.style.setProperty("--text-secondary",dark?"#a0a0c0":"#555577");

    r.style.setProperty("--glass",dark?"rgba(99,102,241,0.08)":"rgba(99,102,241,0.05)");

  useEffect(()=>{
    if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;
  },[aiChat]);

  const level=Math.floor(xp/500)+1;
  const levelXp=xp%500;
  const doneTasks=tasks.filter(t=>t.done);
  const pendingTasks=tasks.filter(t=>!t.done);
  const todayTasks=tasks.filter(t=>t.due===todayDate);
  const urgentTasks=tasks.filter(t=>t.priority==="Urgent"&&!t.done);
  const productivityScore=Math.round((doneTasks.length/tasks.length)*100)||0;

  const toggleTask=(id)=>setTasks(ts=>ts.map(t=>{
    if(t.id===id){if(!t.done)setXp(x=>x+t.xp);return{...t,done:!t.done};}
    return t;
  }));
  const deleteTask=(id)=>setTasks(ts=>ts.filter(t=>t.id!==id));
  const saveTask=()=>{
    if(!taskForm.title)return;
    const task={
      id:Date.now(),title:taskForm.title,category:taskForm.category,
      priority:taskForm.priority,due:taskForm.due,done:false,
      subtasks:taskForm.subtasks.split(",").map(s=>s.trim()).filter(Boolean),
      tags:taskForm.tags.split(",").map(s=>s.trim()).filter(Boolean),
      xp:{Low:20,Medium:40,High:60,Urgent:80}[taskForm.priority],timeEst:60,
    };
    setTasks(ts=>[task,...ts]);
    setShowTaskForm(false);
    setTaskForm({title:"",category:"Work",priority:"Medium",due:todayDate,tags:"",subtasks:""});
  };

  const sendAiMessage=async()=>{
    if(!aiInput.trim()||aiLoading)return;
    if(!orKey){
      setAiChat(c=>[...c,{role:"user",text:aiInput.trim()},{role:"ai",text:"⚠️ Pehle Settings me jaake apni OpenRouter API key add karo, tab main kaam karunga!"}]);
      setAiInput("");
      return;
    }
    const userMsg=aiInput.trim();
    setAiInput("");
    setAiChat(c=>[...c,{role:"user",text:userMsg}]);
    setAiLoading(true);
    try{
      const taskCtx=tasks.slice(0,6).map(t=>`- ${t.title} (${t.priority}, ${t.done?"done":"pending"})`).join("\n");
      const systemPrompt=`You are an AI Productivity Coach. User tasks:\n${taskCtx}\nScore:${productivityScore}%, Streak:${streak}d, Mood:${mood}. Be concise, motivating, use emojis. Under 120 words.`;
      const messages=[
        {role:"system",content:systemPrompt},
        ...[...aiChat,{role:"user",text:userMsg}].map(m=>({role:m.role==="ai"?"assistant":"user",content:m.text}))
      ];
      let reply=null;
      let lastErr="Try again!";
      for(const tryModel of orFallbackModels){
        try{
          const res=await fetch(`https://openrouter.ai/api/v1/chat/completions`,{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`Bearer ${orKey}`},
            body:JSON.stringify({
              model:tryModel,
              messages:messages,
              temperature:0.7,
              max_tokens:300
            })
          });
          const data=await res.json();
          const content=data?.choices?.[0]?.message?.content;
          if(content){reply=content;break;}
          lastErr=data?.error?.message||JSON.stringify(data?.error)||"Provider error";
        }catch(e){
          lastErr="Connection issue";
        }
      }
      setAiChat(c=>[...c,{role:"ai",text:reply||`⚠️ Sabhi free models busy hain (${lastErr}). Thodi der baad try karo.`}]);
    }catch{
      setAiChat(c=>[...c,{role:"ai",text:"⚠️ Connection issue. Try again!"}]);
    }
    setAiLoading(false);
  };

  const filteredTasks=tasks.filter(t=>{
    const ms=t.title.toLowerCase().includes(searchQ.toLowerCase());
    const mc=filterCat==="All"||t.category===filterCat;
    return ms&&mc;
  });

  const S={
    card:{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:14,padding:16},
    glassCard:{background:"var(--glass)",border:"1px solid var(--border)",borderRadius:14,padding:14},
    btn:{padding:"10px 18px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"inherit",transition:"all 0.2s"},
    input:{background:"rgba(255,255,255,0.07)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 13px",color:"var(--text-primary)",fontSize:13,outline:"none",width:"100%",fontFamily:"inherit"},
    badge:{padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:600,display:"inline-block"},

  const StatCard=({icon,label,value,sub,color="#6366f1",progress})=>(

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

      <div style={{marginTop:10}}>
        <div style={{fontSize:22,fontWeight:800,color:"var(--text-primary)"}}>{value}</div>

    </div>
  );

  const TaskCard=({task})=>(
    <div style={{...S.card,display:"flex",gap:10,alignItems:"flex-start",opacity:task.done?0.55:1,borderLeft:`3px solid ${PRIORITY_COLORS[task.priority]}`,marginBottom:8}}>

          {calView==="month"&&(

              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>

              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
                {Array.from({length:35},(_,i)=>{
                  const day=i-1;
                  const date=`2026-07-${String(day).padStart(2,"0")}`;
                  const dt=tasks.filter(t=>t.due===date);

                    <div key={i} style={{minHeight:56,border:"1px solid var(--border)",borderRadius:6,padding:4,background:day===1?"rgba(99,102,241,0.12)":"transparent"}}>

                        <>
                          <div style={{fontSize:11,fontWeight:day===1?700:400,color:day===1?"#818cf8":"var(--text-secondary)",marginBottom:2}}>{day}</div>
                          {dt.slice(0,1).map(t=><div key={t.id} style={{fontSize:9,padding:"1px 3px",borderRadius:3,background:`${CAT_COLORS[t.category]}30`,color:CAT_COLORS[t.category],overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>)}

                    </div>

              </div>
            </div>
          )}
        </div>
      </div>
    );
  };

  /* ====== NOTES ====== */
  const renderNotes=()=>(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{margin:0,fontSize:16,fontWeight:700}}>📝 Notes</h3>
        <button onClick={()=>setActiveNote({id:Date.now(),title:"",content:"",date:todayDate,isNew:true})} style={{...S.btn,padding:"7px 14px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontSize:13}}>+ New</button>

        <div style={{display:"flex",flexDirection:"column",gap:8}}>

          <textarea style={{...S.input,height:260,resize:"none",lineHeight:1.8,background:"transparent",border:"none",padding:0,fontSize:13}}

            </>:<>
              <input style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.05)",color:"#f0f0ff",fontSize:14,marginBottom:12,letterSpacing:4,textAlign:"center"}} placeholder="6-digit OTP" value={otpInput} onChange={e=>setOtpInput(e.target.value)} maxLength={6}/>
              <button onClick={verifyOtp} disabled={authBusy} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontWeight:700,fontSize:14,marginBottom:10,opacity:authBusy?0.6:1,cursor:"pointer"}}>{authBusy?"Verify ho raha hai...":"Verify OTP"}</button>
            </>}
            <button onClick={()=>{setAuthMode("choice");setOtpSent(false);setAuthError("");}} style={{width:"100%",padding:"10px",background:"transparent",border:"none",color:"#8b8ba7",fontSize:13,cursor:"pointer"}}>← Wapas jao</button>
          </>}
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:"var(--bg-primary)",color:"var(--text-primary)",fontFamily:"'Inter',system-ui,sans-serif",display:"flex"}}>

      {/* ====== DESKTOP SIDEBAR ====== */}
      <div className="desktop-only" style={{width:sidebarOpen?270:64,minHeight:"100vh",background:"var(--bg-secondary)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",transition:"width 0.3s",overflow:"hidden",flexShrink:0}}>
        <div style={{padding:16,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setSidebarOpen(s=>!s)}>
          <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="zap" size={18} color="#fff" fill="#fff"/></div>
          {sidebarOpen&&<div style={{minWidth:0}}>
            <div style={{fontWeight:800,fontSize:15,color:"var(--text-primary)",whiteSpace:"nowrap"}}>NovaProd AI</div>
            <div style={{fontSize:10,color:"var(--text-muted)",whiteSpace:"nowrap"}}>Your productivity partner</div>
          </div>}
        </div>

        <div style={{padding:"4px 12px 8px"}}>
          <div style={{...S.glassCard,display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px"}} onClick={()=>setView("settings")}>
            <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff",flexShrink:0}}>N</div>
            {sidebarOpen&&<>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>NovaAITech</div>
                <div style={{fontSize:10,color:"var(--text-muted)",whiteSpace:"nowrap"}}>Level {level} · <span style={{color:"#818cf8"}}>{xp}XP</span></div>
              </div>
              <Icon name="chevronRight" size={15} color="var(--text-muted)"/>
            </>}
          </div>
        </div>

        <div style={{flex:1,padding:"4px 7px",overflowY:"auto"}}>
          {Object.entries(views).slice(0,5).map(([id,v])=>(
            <div key={id} onClick={()=>setView(id)} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 12px",borderRadius:10,cursor:"pointer",whiteSpace:"nowrap",background:view===id?"rgba(99,102,241,0.18)":"transparent",color:view===id?"#a5a8fb":"var(--text-secondary)",marginBottom:2,fontSize:13,fontWeight:500,transition:"all 0.15s"}}>
              <Icon name={v.icon} size={18} strokeWidth={2}/>
              {sidebarOpen&&v.label}
            </div>
          ))}
          <div style={{height:1,background:"var(--border)",margin:"8px 6px"}}/>
          {Object.entries(views).slice(5).map(([id,v])=>(
            <div key={id} onClick={()=>setView(id)} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 12px",borderRadius:10,cursor:"pointer",whiteSpace:"nowrap",background:view===id?"rgba(99,102,241,0.18)":"transparent",color:view===id?"#a5a8fb":"var(--text-secondary)",marginBottom:2,fontSize:13,fontWeight:500,transition:"all 0.15s"}}>
              <Icon name={v.icon} size={18} strokeWidth={2}/>
              {sidebarOpen&&v.label}
            </div>
          ))}
        </div>

        {sidebarOpen&&(
          <div style={{padding:12}}>
            <div style={{...S.card,background:"linear-gradient(160deg,rgba(99,102,241,0.15),rgba(139,92,246,0.08))",border:"1px solid rgba(99,102,241,0.25)",padding:14}}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="bot" size={17} color="#fff"/></div>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13}}>AI Coach</div>
                  <div style={{fontSize:11,color:"var(--text-muted)",lineHeight:1.4,marginTop:2}}>Get personalized insights & improve your daily habits.</div>
                </div>
              </div>
              <button onClick={()=>setView("ai")} style={{...S.btn,marginTop:10,width:"100%",background:"rgba(99,102,241,0.18)",color:"#a5a8fb",fontSize:12,padding:"8px 10px",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>Start Now <Icon name="arrowRight" size={13}/></button>
            </div>
          </div>
        )}

        <div style={{padding:sidebarOpen?"0 12px 14px":"0 0 14px",display:"flex",justifyContent:"center"}}>
          <div style={{...(sidebarOpen?S.card:{}),display:"flex",alignItems:"center",justifyContent:sidebarOpen?"space-between":"center",gap:8,width:"100%",padding:sidebarOpen?"10px 12px":0}}>
            {sidebarOpen&&<div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,fontWeight:500,color:"var(--text-secondary)"}}><Icon name="moon" size={15}/>Dark Mode</div>}
            <div onClick={()=>setDark(d=>!d)} style={{width:sidebarOpen?38:34,height:sidebarOpen?21:19,borderRadius:12,background:dark?"#6366f1":"rgba(255,255,255,0.2)",position:"relative",cursor:"pointer",transition:"background 0.3s",flexShrink:0}}>
              <div style={{position:"absolute",top:2,left:dark?(sidebarOpen?19:17):2,width:sidebarOpen?17:15,height:sidebarOpen?17:15,borderRadius:"50%",background:"#fff",transition:"left 0.3s"}}/>
            </div>
          </div>
        </div>
      </div>

      {/* ====== MAIN CONTENT ====== */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>

        {/* TOPBAR */}
        <div style={{height:60,background:"var(--bg-secondary)",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",padding:"0 16px",gap:10,flexShrink:0}}>
          {/* Mobile menu button */}
          <button className="mobile-only" onClick={()=>setSidebarOpen(s=>!s)} style={{background:"rgba(255,255,255,0.07)",border:"none",cursor:"pointer",color:"var(--text-primary)",padding:"7px",borderRadius:8,flexShrink:0,display:"flex"}}><Icon name="menu" size={18}/></button>
          <div className="desktop-only" style={{color:"#818cf8",display:"flex",flexShrink:0}}><Icon name={views[view]?.icon} size={22} strokeWidth={2}/></div>
          <div style={{flex:1,minWidth:0}}>
            <h1 style={{margin:0,fontSize:18,fontWeight:800,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{views[view]?.label}</h1>
            <div className="desktop-only" style={{fontSize:10,color:"var(--text-muted)"}}>July 1, 2026</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <button className="desktop-only" style={{background:"rgba(255,255,255,0.07)",border:"none",cursor:"pointer",color:"var(--text-secondary)",padding:"9px",borderRadius:9,display:"flex"}}><Icon name="search" size={17}/></button>
            <button style={{background:"rgba(255,255,255,0.07)",border:"none",cursor:"pointer",color:"var(--text-secondary)",padding:"9px",borderRadius:9,position:"relative",display:"flex"}}>
              <Icon name="bell" size={17}/>
              <span style={{position:"absolute",top:7,right:7,width:6,height:6,borderRadius:"50%",background:"#8b5cf6"}}/>
            </button>
            <button onClick={()=>setDark(d=>!d)} style={{background:"rgba(255,255,255,0.07)",border:"none",cursor:"pointer",color:"var(--text-primary)",padding:"9px",borderRadius:9,display:"flex"}}><Icon name={dark?"sun":"moon"} size={17}/></button>
            <button onClick={()=>{setShowTaskForm(true);setView("tasks");}} style={{width:34,height:34,borderRadius:9,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="plus" size={17}/></button>
          </div>
        </div>

        {/* Mobile Sidebar Overlay */}
        {isMobile&&sidebarOpen&&(
          <div style={{position:"fixed",inset:0,zIndex:300,display:"flex"}}>
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)"}} onClick={()=>setSidebarOpen(false)}/>
            <div style={{position:"relative",width:250,background:"var(--bg-secondary)",height:"100%",display:"flex",flexDirection:"column",zIndex:1,borderRight:"1px solid var(--border)"}}>
              <div style={{padding:16,display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:36,height:36,borderRadius:11,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="zap" size={17} color="#fff" fill="#fff"/></div>
                <div>
                  <div style={{fontWeight:800,fontSize:14}}>NovaProd AI</div>
                  <div style={{fontSize:10,color:"var(--text-muted)"}}>Your productivity partner</div>
                </div>
              </div>
              <div style={{padding:"0 12px 8px"}}>
                <div style={{...S.glassCard,display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px"}} onClick={()=>{setView("settings");setSidebarOpen(false);}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff",flexShrink:0}}>N</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600}}>NovaAITech</div>
                    <div style={{fontSize:10,color:"var(--text-muted)"}}>Level {level} · <span style={{color:"#818cf8"}}>{xp}XP</span></div>
                  </div>
                  <Icon name="chevronRight" size={15} color="var(--text-muted)"/>
                </div>
              </div>
              <div style={{flex:1,padding:"6px 8px",overflowY:"auto"}}>
                {Object.entries(views).map(([id,v])=>(
                  <div key={id} onClick={()=>{setView(id);setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 12px",borderRadius:10,cursor:"pointer",background:view===id?"rgba(99,102,241,0.18)":"transparent",color:view===id?"#a5a8fb":"var(--text-secondary)",marginBottom:2,fontSize:14,fontWeight:500}}>
                    <Icon name={v.icon} size={18}/>{v.label}
                  </div>
                ))}
              </div>
              <div style={{padding:14,borderTop:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,fontWeight:500,color:"var(--text-secondary)"}}><Icon name="moon" size={14}/>Dark Mode</div>
                <div onClick={()=>setDark(d=>!d)} style={{width:38,height:21,borderRadius:12,background:dark?"#6366f1":"rgba(255,255,255,0.2)",position:"relative",cursor:"pointer",flexShrink:0}}>
                  <div style={{position:"absolute",top:2,left:dark?19:2,width:17,height:17,borderRadius:"50%",background:"#fff",transition:"left 0.3s"}}/>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* PAGE CONTENT */}
        <div style={{flex:1,overflow:"auto",padding:isMobile?"14px":"20px",paddingBottom:isMobile?"80px":"40px"}}>
          {views[view]?.render()}
        </div>
      </div>

      {/* ====== MOBILE BOTTOM NAV ====== */}
      <div id="bottom-nav" style={{position:"fixed",bottom:0,left:0,right:0,height:64,background:"var(--bg-secondary)",borderTop:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-around",zIndex:100,backdropFilter:"blur(20px)"}}>
        {bottomNavViews.map(id=>(
          <div key={id} onClick={()=>setView(id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",flex:1,padding:"6px 0"}}>
            <div style={{color:view===id?"#a5a8fb":"var(--text-muted)",filter:view===id?"drop-shadow(0 0 6px #6366f1)":"none",display:"flex"}}><Icon name={views[id].icon} size={20}/></div>
            <span style={{fontSize:9,fontWeight:600,color:view===id?"#a5a8fb":"var(--text-muted)"}}>{views[id].label}</span>
          </div>
        ))}
        <div onClick={()=>setSidebarOpen(true)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",flex:1,padding:"6px 0"}}>
          <div style={{color:"var(--text-muted)",display:"flex"}}><Icon name="more" size={20}/></div>
          <span style={{fontSize:9,fontWeight:600,color:"var(--text-muted)"}}>More</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
