/* ── RADIAL RING ── */
function Ring({pct,size=72,sw=7,color="#6366f1",label,value}){
  const r=(size-sw)/2,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={sw}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:size>60?13:10,fontWeight:800,color:"#fff"}}>{value||pct+"%"}</span>
        {label&&<span style={{fontSize:8,color:"rgba(255,255,255,0.5)",textAlign:"center",lineHeight:1.1}}>{label}</span>}
      </div>
    </div>
  );
}

/* ── BAR CHART ── */
function BarChart({data,vk,color="#6366f1",h=80}){
  const max=Math.max(...data.map(d=>d[vk]));
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:5,height:h}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{width:"100%",borderRadius:5,background:`linear-gradient(180deg,${color},${color}80)`,height:`${(d[vk]/max)*(h-18)}px`,minHeight:4}}/>

/* ── POMODORO ── */
function Pomodoro(){
  const [mode,setMode]=useState("focus");
  const [left,setLeft]=useState(25*60);
  const [run,setRun]=useState(false);
  const [sess,setSess]=useState(0);
  const ref=useRef();
  const DUR={focus:25*60,short:5*60,long:15*60};
  const LBL={focus:"Focus Time",short:"Short Break",long:"Long Break"};
  const CLR={focus:"#6366f1",short:"#10b981",long:"#8b5cf6"};
  useEffect(()=>{
    if(run){ref.current=setInterval(()=>setLeft(t=>{if(t<=1){clearInterval(ref.current);setRun(false);if(mode==="focus")setSess(s=>s+1);return 0;}return t-1;}),1000);}
    else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[run,mode]);
  const sw=(m)=>{setMode(m);setLeft(DUR[m]);setRun(false);};
  const mm=String(Math.floor(left/60)).padStart(2,"0"),ss=String(left%60).padStart(2,"0");
  const pct=((DUR[mode]-left)/DUR[mode])*100;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:18}}>
      <div style={{display:"flex",gap:6}}>
        {Object.keys(DUR).map(m=>(
          <button key={m} onClick={()=>sw(m)} style={{padding:"7px 14px",borderRadius:22,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:mode===m?CLR[m]:"rgba(255,255,255,0.08)",color:mode===m?"#fff":"rgba(255,255,255,0.5)",transition:"all .2s"}}>
            {LBL[m]}
          </button>
        ))}
      </div>
      <div style={{position:"relative",width:180,height:180}}>
        <svg width={180} height={180} style={{transform:"rotate(-90deg)"}}>
          <circle cx={90} cy={90} r={78} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={10}/>
          <circle cx={90} cy={90} r={78} fill="none" stroke={CLR[mode]} strokeWidth={10}
            strokeDasharray={490} strokeDashoffset={490-(pct/100)*490} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:42,fontWeight:900,letterSpacing:-2,color:"#fff"}}>{mm}:{ss}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{LBL[mode]}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>setRun(r=>!r)} style={{padding:"13px 34px",borderRadius:14,border:"none",cursor:"pointer",background:CLR[mode],color:"#fff",fontWeight:800,fontSize:16,boxShadow:`0 6px 24px ${CLR[mode]}60`,transition:"all .2s"}}>
          {run?"⏸ Pause":"▶ Start"}
        </button>
        <button onClick={()=>{setLeft(DUR[mode]);setRun(false);}} style={{padding:"13px 18px",borderRadius:14,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.6)",fontSize:16}}>↺</button>
      </div>
      <div style={{display:"flex",gap:20,fontSize:13}}>
        <span style={{color:"rgba(255,255,255,0.5)"}}>🍅 <strong style={{color:"#fff"}}>{sess}</strong> sessions</span>
        <span style={{color:"rgba(255,255,255,0.5)"}}>⏱ <strong style={{color:"#fff"}}>{sess*25}min</strong></span>
      </div>
    </div>
  );
}

function Login(){
  const [mode,setMode]=useState("google"); // google | email | phone
  const [emailTab,setEmailTab]=useState("signin"); // signin | signup
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [phone,setPhone]=useState("");
  const [otp,setOtp]=useState("");
  const [otpSent,setOtpSent]=useState(false);
  const [confirmRes,setConfirmRes]=useState(null);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");

  const googleLogin=async()=>{
    setErr("");setBusy(true);
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      await firebase.auth().signInWithPopup(provider);
    }catch(e){setErr(e.message||"Google sign-in failed");}
    setBusy(false);
  };

  const emailSubmit=async()=>{
    if(!email||!pass){setErr("Enter email & password");return;}
    setErr("");setBusy(true);
    try{
      if(emailTab==="signin")await firebase.auth().signInWithEmailAndPassword(email,pass);
      else await firebase.auth().createUserWithEmailAndPassword(email,pass);
    }catch(e){setErr(e.message||"Authentication failed");}
    setBusy(false);
  };

  const setupRecaptcha=()=>{
    if(!window.recaptchaVerifier){
      window.recaptchaVerifier=new firebase.auth.RecaptchaVerifier("recaptcha-container",{size:"invisible"});
    }
    return window.recaptchaVerifier;
  };

  const sendOtp=async()=>{
    if(!phone||phone.length<10){setErr("Enter a valid phone number with country code, e.g. +91XXXXXXXXXX");return;}
    setErr("");setBusy(true);
    try{
      const verifier=setupRecaptcha();
      const res=await firebase.auth().signInWithPhoneNumber(phone,verifier);
      setConfirmRes(res);setOtpSent(true);
    }catch(e){setErr(e.message||"Failed to send OTP");}
    setBusy(false);
  };

  const verifyOtp=async()=>{
    if(!otp||!confirmRes){setErr("Enter the OTP");return;}
    setErr("");setBusy(true);
    try{await confirmRes.confirm(otp);}
    catch(e){setErr(e.message||"Invalid OTP");}
    setBusy(false);
  };

  const tabBtn=(id,label)=>(
    <button onClick={()=>{setMode(id);setErr("");}} style={{flex:1,padding:"10px 6px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:12.5,background:mode===id?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,0.06)",color:mode===id?"#fff":"rgba(255,255,255,0.5)",transition:"all .2s"}}>{label}</button>
  );

  const fieldStyle={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,padding:"12px 14px",color:"#f0f0ff",fontSize:14,outline:"none",width:"100%"};

  return(
    <div style={{minHeight:"100vh",background:"#0d0d1a",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>

          <div style={{fontWeight:800,fontSize:22,color:"#fff"}}>Towards the Goal</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.45)",marginTop:2}}>Your Journey Towards Success</div>
        </div>

        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {tabBtn("google","Google")}
          {tabBtn("email","Email")}
          {tabBtn("phone","Phone")}
        </div>

        {err&&<div style={{background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.3)",color:"#fca5a5",fontSize:12,borderRadius:10,padding:"10px 12px",marginBottom:14}}>{err}</div>}

        {mode==="google"&&(
          <button onClick={googleLogin} disabled={busy} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",cursor:"pointer",background:"#fff",color:"#1f1f1f",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4c-7.7 0-14.4 4.3-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.5-2.1 14.3-5.5l-6.6-5.6C29.6 34.7 27 35.6 24 35.6c-5.3 0-9.7-3.1-11.3-7.9l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.6 5.6C41.4 36.3 44 30.7 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
            Continue with Google

        {mode==="email"&&(

              <button onClick={()=>setEmailTab("signin")} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12.5,fontWeight:700,background:emailTab==="signin"?"rgba(99,102,241,0.25)":"transparent",color:emailTab==="signin"?"#a5b4fc":"rgba(255,255,255,0.5)"}}>Sign In</button>

            </button>
          </div>
        )}

        {mode==="phone"&&(
          <div>
            {!otpSent?(
              <>
                <input type="tel" placeholder="+91XXXXXXXXXX" value={phone} onChange={e=>setPhone(e.target.value)} style={{...fieldStyle,marginBottom:14}}/>
                <button onClick={sendOtp} disabled={busy} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontWeight:700,fontSize:14}}>
                  {busy?"Sending…":"Send OTP"}
                </button>
              </>
            ):(
              <>
                <input type="text" inputMode="numeric" placeholder="Enter 6-digit OTP" value={otp} onChange={e=>setOtp(e.target.value)} style={{...fieldStyle,marginBottom:14,letterSpacing:4,textAlign:"center"}}/>
                <button onClick={verifyOtp} disabled={busy} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontWeight:700,fontSize:14,marginBottom:10}}>
                  {busy?"Verifying…":"Verify & Continue"}

                <button onClick={()=>{setOtpSent(false);setOtp("");}} style={{width:"100%",padding:"10px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:"rgba(255,255,255,0.5)",fontSize:12.5}}>← Change number</button>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#fff"}}>{item.label}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{item.desc}</div>
              </div>
              {item.ctrl}
            </div>
          ))}
        </div>
      ))}
    </div>
  );

  const VIEWS={dashboard:vDash,tasks:vTasks,ai:vAI,focus:vFocus,habits:vHabits,calendar:vCal,notes:vNotes,reports:vReports,settings:vSettings};
  const BNAV=["dashboard","tasks","habits","focus","ai"];
  const BICONS={dashboard:<svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,tasks:<svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9 11 12 14 22 4"/></svg>,habits:<svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>,focus:<svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,ai:<svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>};
  const BLBLS={dashboard:"Home",tasks:"Tasks",habits:"Habits",focus:"Focus",ai:"AI"};

  return(
    <div style={{minHeight:"100vh",background:"#0d0d1a",color:"#f0f0ff",fontFamily:"'Inter',system-ui,sans-serif",display:"flex"}}>

      {/* DESKTOP SIDEBAR */}
      <div className="desk-only" style={{width:260,minHeight:"100vh",background:"#0d0d1a",borderRight:"1px solid rgba(255,255,255,0.06)",flexShrink:0,position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
        <Sidebar/>
      </div>

      {/* MOBILE DRAWER */}
      {drawer&&(
        <div style={{position:"fixed",inset:0,zIndex:400,display:"flex"}}>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.75)"}} onClick={()=>setDrawer(false)}/>
          <div style={{position:"relative",width:260,background:"#0d0d1a",height:"100%",zIndex:1,overflowY:"auto",borderRight:"1px solid rgba(255,255,255,0.06)"}}>
            <Sidebar mobile/>
          </div>
        </div>
      )}

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <TopBar/>
        <div style={{flex:1,overflow:"auto",padding:isMob?"14px":"20px",paddingBottom:isMob?"80px":"40px"}}>
          {VIEWS[view]?.()}
        </div>
      </div>

      {/* MOBILE BOTTOM NAV */}
      <div id="bnav" style={{position:"fixed",bottom:0,left:0,right:0,height:64,background:"rgba(13,13,26,0.97)",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"space-around",zIndex:100,backdropFilter:"blur(24px)"}}>
        {BNAV.map(id=>(
          <div key={id} onClick={()=>setView(id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",flex:1,padding:"6px 0",color:view===id?"#818cf8":"rgba(255,255,255,0.35)",transition:"all .2s"}}>
            {BICONS[id]}
            <span style={{fontSize:10,fontWeight:view===id?700:500}}>{BLBLS[id]}</span>
            {view===id&&<div style={{width:4,height:4,borderRadius:"50%",background:"#6366f1"}}/>}
          </div>
        ))}
        <div onClick={()=>setDrawer(true)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",flex:1,padding:"6px 0",color:"rgba(255,255,255,0.35)"}}>
          <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          <span style={{fontSize:10,fontWeight:500}}>More</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate/>);
</script>
</body>
</html>
